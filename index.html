<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#F9C400"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="JCB Working"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <title>JCB Working</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>

  <!-- App Styles -->
  <link rel="stylesheet" href="css/style.css"/>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <div id="app">
    <div id="page-container"></div>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="bottom-nav hidden">
      <button class="nav-btn" data-page="home">
        <span class="material-icons-round">home</span>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-page="history">
        <span class="material-icons-round">history</span>
        <span>History</span>
      </button>
      <button class="nav-btn fab-btn" data-page="start-work">
        <span class="material-icons-round">add</span>
      </button>
      <button class="nav-btn" data-page="reports">
        <span class="material-icons-round">bar_chart</span>
        <span>Reports</span>
      </button>
      <button class="nav-btn" data-page="settings">
        <span class="material-icons-round">settings</span>
        <span>Settings</span>
      </button>
    </nav>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast hidden"></div>

  <!-- Confirm Dialog -->
  <div id="confirm-overlay" class="overlay hidden">
    <div class="dialog">
      <h3 id="confirm-title">Confirm</h3>
      <p id="confirm-msg"></p>
      <div class="dialog-actions">
        <button id="confirm-cancel" class="btn-outline">Cancel</button>
        <button id="confirm-ok" class="btn-danger">Confirm</button>
      </div>
    </div>
  </div>

  <!-- ── Core Scripts (load order matters) ── -->
  <script src="js/db.js"></script>
  <script src="js/share.js"></script>
  <script src="js/pdf.js"></script>

  <!-- ── Page Scripts ── -->
  <script src="js/pages/login.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/start-work.js"></script>
  <script src="js/pages/running.js"></script>
  <script src="js/pages/end-work.js"></script>
  <script src="js/pages/history.js"></script>
  <script src="js/pages/detail.js"></script>
  <script src="js/pages/reports.js"></script>
  <script src="js/pages/settings.js"></script>
  <script src="js/pages/customer-history.js"></script>

  <!-- ── App Controller (last) ── -->
  <script src="js/app.js"></script>

  <!-- ── PWA Service Worker ── -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(r => console.log('SW registered'))
          .catch(e => console.log('SW error', e));
      });
    }
  </script>

</body>
</html>
